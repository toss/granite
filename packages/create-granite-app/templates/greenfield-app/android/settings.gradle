pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = '%%nativeAppName%%'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

apply from: file("../node_modules/brick-module/android/brick_modules.gradle")
applyBrickModules(settings, [projectRoot: "../", appProject: "app"])

def brownfieldModuleProject = findProject(":granite-js_brownfield-module")
if (brownfieldModuleProject != null) {
    brownfieldModuleProject.projectDir = file("brick-brownfield-module")
}
